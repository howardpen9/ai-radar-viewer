<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📡 AI Ecosystem Radar</title>
  <meta name="description" content="每日追蹤 AI 編碼工具、MCP 生態、開源趨勢" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
  <link rel="alternate" type="application/atom+xml" title="AI Radar Feed" href="/feed.xml" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header bar -->
    <header id="hdr">
      <div class="brand">
        <span class="brand-icon">📡</span>
        <span>ai-ecosystem-<em>radar</em></span>
      </div>
      <div class="hdr-right">
        <div class="signal"></div>
        <button id="width-toggle" title="切換寬度">⇔</button>
        <div class="font-size-ctrl">
          <button id="font-down" title="縮小字體">A-</button>
          <span id="font-size-label">M</span>
          <button id="font-up" title="放大字體">A+</button>
        </div>
        <a id="rss-link" href="/feed.xml" title="RSS Feed">⊕ RSS</a>
        <button id="theme-toggle">◐ LIGHT</button>
      </div>
    </header>

    <div id="body">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div id="mob-toggle">☰ &nbsp;選擇日期</div>
        <div class="side-label">DATES</div>
        <div class="search-wrap">
          <input id="search-input" type="search" placeholder="搜索全文，如 Claude Code" />
          <div id="search-status"></div>
        </div>
        <div id="date-nav"></div>
      </aside>

      <!-- Main content -->
      <div id="cwrap">
        <main id="main">
          <header id="date-header" class="date-header"></header>
          <section id="hero" class="hero"></section>
          <section id="reports" class="reports"></section>
        </main>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
